# hypridle.conf — Idle daemon config
#
# Timeout chain:
#   5 min  → dim screen (brightnessctl)
#   8 min  → lock screen (hyprlock)
#   10 min → turn off monitors (DPMS off)
#   15 min → suspend system

general {
    lock_cmd = pidof hyprlock || hyprlock   # don't spawn multiple instances
    before_sleep_cmd = loginctl lock-session # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpmsoff && hyprctl dispatch dpmson # wake monitors
    ignore_dbus_inhibit = false
}

# ── 5 min: dim screen ───────────────────────────────────────────────────
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

# ── 8 min: lock screen ──────────────────────────────────────────────────
listener {
    timeout = 480
    on-timeout = loginctl lock-session
}

# ── 10 min: monitors off (DPMS) ─────────────────────────────────────────
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpmsoff
    on-resume = hyprctl dispatch dpmson
}

# ── 15 min: suspend ─────────────────────────────────────────────────────
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
