# hyprlock.conf — Lock screen config
# Colors: Gruvbox Dark (matches look_n_feel.conf)
#
# Gruvbox palette reference:
#   bg:      1d2021 / 282828
#   fg:      ebdbb2
#   orange:  fe8019
#   yellow:  fbf1c7
#   gray:    a89984
#   overlay: 00000088

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

# ── Background ──────────────────────────────────────────────────────────
background {
    monitor =
    path = ~/.dotfiles/visual/wallpapers/mordor_001.jpg

    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.2
    contrast = 1.0
}

# ── Clock ───────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(ebdbb2ff)
    font_size = 90
    font_family = Hack Nerd Font Mono Bold
    shadow_passes = 3
    shadow_size = 4

    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(a89984ff)
    font_size = 18
    font_family = Hack Nerd Font Mono

    position = 0, -20
    halign = center
    valign = center
}

# ── Password input ──────────────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(fe8019ee)
    inner_color = rgba(1d202188)
    font_color = rgba(ebdbb2ff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i><span foreground="##a89984">Enter password...</span></i>

    fail_color = rgba(cc241dee)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition = 300

    capslock_color = rgba(d79921ee)
    numlock_color = -1
    bothlock_color = -1

    check_color = rgba(fbf1c7ee)

    hide_input = false
    rounding = 12

    position = 0, -180
    halign = center
    valign = center
}

# ── User label ──────────────────────────────────────────────────────────
label {
    monitor =
    text =  $USER
    color = rgba(ebdbb2cc)
    font_size = 14
    font_family = Hack Nerd Font Mono

    position = 0, -120
    halign = center
    valign = center
}
